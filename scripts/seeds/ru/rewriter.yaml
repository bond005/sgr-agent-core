scenario: rewriter
description: Смена стиля, перефразирование, изменение тона и упрощение текста.
seeds:
  - "Перепишите следующее предложение в формальном академическом тоне: «Компания вообще провалила запуск и потеряла кучу клиентов.»"
  - "Перефразируйте этот абзац в двух разных стилях — игривом и журналистском. Оригинал: Новая политика требует, чтобы все сотрудники возвращались в офис четыре дня в неделю, что вызвало споры среди персонала."
  - "Упростите этот медицинский текст так, чтобы его понял двенадцатилетний ребёнок: «У пациента наблюдалась острая локализованная боль в животе в правой нижней четверти, что указывает на аппендицит.»"
  - "Перепишите этот отзыв о товаре так, чтобы он стал конструктивным и вежливым вместо злого: «Худшая покупка в жизни, сломался через два дня, полный мусор, не берите.»"
  - "Преобразуйте этот абзац в страдательном залоге в действительный залог, не меняя смысла: «Отчёт был написан аналитиком и проверен руководителем перед тем, как его представили совету директоров.»"
  - "Перепишите следующее техническое объяснение для нетехнической аудитории руководителей менее чем в 60 словах: «Мы перевели монолит на микросервисную архитектуру с использованием Kubernetes, сократив время развёртывания с часов до минут.»"
  - "Измените тон этого письма с требовательного на партнёрский: «Мне нужен этот отчёт завтра утром, без отговорок.»"
  - "Перепишите это сказочное вступление в жёстком детективном стиле: «В некотором царстве, в некотором государстве жила-была юная принцесса в высоком замке.»"
  - "Превратите этот маркированный список в связный абзац с плавными переходами: быстрая загрузка, адаптивный дизайн, безопасный вход, удобная оплата, быстрая поддержка."
