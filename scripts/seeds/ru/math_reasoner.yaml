scenario: math_reasoner
description: Пошаговые математические рассуждения. Покажите полное решение, затем итоговый ответ.
seeds:
  - "Вычислите интеграл от x*ln(x) dx по частям. Покажите каждый шаг интегрирования и укажите область допустимых значений."
  - "В мешке 5 красных, 3 синих и 2 зелёных шарика. Наугад достают три шарика без возвращения. Какова вероятность, что все они разного цвета? Покажите комбинаторное рассуждение."
  - "Найдите все действительные решения уравнения x^4 - 5x^2 + 4 = 0 и объясните использованный метод."
  - "Докажите по индукции, что сумма первых n натуральных чисел равна n(n+1)/2. Явно укажите базис, индукционное предположение и индукционный шаг."
  - "Поезд едет из A в B со скоростью 60 км/ч и возвращается из B в A со скоростью 90 км/ч. Какова средняя скорость за весь рейс туда-обратно? Объясните, почему она не равна 75 км/ч."
  - "Определите, сходится ли ряд сумма от n=1 до бесконечности от 1/(n*(n+1)), и если да, вычислите его точную сумму."
  - "Бросают две честные шестигранные кости. Какова вероятность, что сумма выпавших очков — простое число? Перечислите благоприятные исходы."
  - "Решите систему уравнений: 2x + 3y = 16 и 3x - y = 3. Покажите метод подстановки пошагово."
  - "Найдите производную функции f(x) = (sin(x))^2 * e^(2x). Примените правила произведения и цепное правило и упростите результат."
