scenario: factual_qa
description: Одноходовые фактические вопросы, на которые можно ответить по одному-двум поисковым запросам.
seeds:
  - "Кто является действующим Генеральным секретарём ООН и когда начался его срок полномочий?"
  - "Какова численность населения Йоханнесбурга согласно последней переписи?"
  - "Когда был запущен космический телескоп «Джеймс Уэбб» и в какой точке он находится на орбите?"
  - "Кто режиссёр фильма «Паразиты» и сколько премий «Оскар» он получил?"
  - "Какая официальная валюта Бразилии и каков её код по стандарту ISO 4217?"
  - "Назовите действующего премьер-министра Японии и его политическую партию."
  - "Какова высота горы Аконкагуа в метрах и в какой стране она расположена?"
  - "Когда был подписан Договор о нераспространении ядерного оружия и сколько государств являются его участниками?"
  - "Каков размах крыльев странствующего альбатроса и где он в основном гнездится?"
  - "Кто получил Нобелевскую премию по литературе в 2024 году и за какие произведения лауреат наиболее известен?"
