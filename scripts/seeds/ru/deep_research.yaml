scenario: deep_research
description: Многоходовые задачи, требующие нескольких запросов, извлечения содержимого и синтеза из разных источников.
seeds:
  - "Сравните воздействие на окружающую среду литий-ионных и твердотельных аккумуляторов на протяжении всего жизненного цикла, приведя количественные данные минимум из трёх независимых источников."
  - "Проследите эволюцию Общего регламента по защите данных ЕС: каковы были ключевые поправки между первым проектом и окончательным принятием, какие стороны влияли на каждую из них и какие штрафы были применены с момента вступления в силу?"
  - "Проанализируйте причины банковской турбулентности 2023 года (Silicon Valley Bank, Credit Suisse, Signature Bank): выделите общие факторы риска, пробелы в регулировании и экстренные меры, принятые властями в каждом случае."
  - "Как сравнивается углеродоёмкость производства электроэнергии в Германии и Франции за последнее десятилетие и какие политические решения объясняют эту разницу?"
  - "Изучите текущее состояние термоядерной энергетики: основные конкурирующие подходы к удержанию плазмы, последние достижения по энергетическому выигрышу и прогнозируемые сроки появления коммерческих реакторов."
  - "Сравните эффективность и побочные эффекты мРНК- и вектороных вакцин от COVID-19 на основе рецензируемых исследований, опубликованных после 2022 года."
  - "Каковы главные технические и экономические барьеры для масштабного производства «зелёного» водорода и какие страны лидируют в его внедрении?"
  - "Опишите цепочку поставок неодимовых магнитов: где добывается руда, где она перерабатывается и какие геополитические риски влияют на её доступность?"
