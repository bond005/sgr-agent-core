scenario: summarizer
description: Многоуровневое саммаризацию текста. Агент извлекает ключевые тезисы и формирует структурированные краткие изложения.
seeds:
  - "Сделайте саммаризацию следующей статьи в формате: абзац-аннотация, список из пяти ключевых тезисов и одно предложение-«выжимка» (TL;DR): https://ru.wikipedia.org/wiki/Трансформер_(нейросеть)"
  - "Прочитайте материал по адресу https://ru.wikipedia.org/wiki/Снижение_последствий_изменения_климата и подготовьте: (1) краткое резюме для лиц, принимающих решения, (2) технический обзор основных стратегий со снижения выбросов с оценкой их воздействия."
  - "Подготовьте иерархическое саммаризацию статьи https://ru.wikipedia.org/wiki/Великая_французская_революция: краткий обзор, а затем отдельные разделы о причинах, ключевых событиях и последствиях."
  - "Сделайте саммаризацию статьи https://ru.wikipedia.org/wiki/Квантовый_компьютер на трёх уровнях сложности: для ребёнка, для старшеклассника и для выпускника технического вуза."
  - "Извлеките и кратко изложите основные аргументы из материала https://ru.wikipedia.org/wiki/Безусловный_базовый_доход, разделив их на «за» и «против» с двумя наиболее весомыми доводами в каждой группе."
  - "Подготовьте хронологическое саммаризацию ключевых событий из статьи https://ru.wikipedia.org/wiki/История_искусственного_интеллекта и выделите три наиболее значимых прорыва с обоснованием."
  - "Сделайте саммаризацию статьи https://ru.wikipedia.org/wiki/Циркулярная_экономика в виде структурированного обзора: определение, основные принципы, выгоды для бизнеса и проблемы внедрения."
  - "Подготовьте многоуровневое саммаризацию статьи https://ru.wikipedia.org/wiki/Проект_«Геном_человека»>, охватывающее научные цели, методы, ключевые результаты и этические последствия."
