scenario: instruction_following
description: Задачи, требующие строгого соблюдения форматных и структурных ограничений.
seeds:
  - "Извлеките сущности из этого текста в виде нумерованного списка в формате ИМЯ - ТИП. Текст: Мария Кюри открыла радий в 1898 году, работая в Париже; позже, в 1911 году, она получила вторую Нобелевскую премию."
  - "Преобразуйте следующие данные, разделённые запятыми, в аккуратную таблицу с разделителем '|', содержащую строку заголовков. Данные: имя,возраст,город,Алиса,30,Париж,Борис,25,Лондон"
  - "Ответьте ровно тремя предложениями, каждое из которых начинается с разной буквы алфавита, объясняя, почему небо голубое."
  - "Преобразуйте эти требования в чек-лист с чекбоксами, упорядоченный по приоритету (от высокого к среднему и низкому): страница входа, тёмная тема, платёжный модуль, аватары пользователей, строка поиска."
  - "Составьте корректный JSON-объект, описывающий книгу, с ключами title, author, year и genres (массив). Выведите ТОЛЬКО JSON, без сопроводительного текста. Книга: «Дюна» Фрэнка Герберта, 1965, научная фантастика."
  - "Дано входное предложение «The quick brown fox». Выведите одну строку со словами в обратном порядке, разделёнными дефисами. Больше ничего."
  - "Напишите хокку (5-7-5 слогов) об осени, а затем одной строкой объясните использованный вами подсчёт слогов."
  - "Классифицируйте каждый из этих объектов как 'фрукт' или 'овощ' в виде выровненного двухколоночного списка: помидор, морковь, яблоко, огурец, клубника, тыква."
  - "Кратко изложите правила шахмат менее чем в 60 словах, упомянув рокировку, взятие на проходе и мат."
