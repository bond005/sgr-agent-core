scenario: data_analyst
description: Анализ табличных данных с помощью PandasAnalysisTool по CSV-файлам в рабочем каталоге (sales.csv, population.csv, students.csv).
seeds:
  - "По файлу sales.csv: какой регион принёс наибольшую суммарную выручку и какова эта сумма?"
  - "По файлу sales.csv: сравните среднее число проданных единиц за квартал для товаров Widget и Gadget. Какой продукт рос быстрее с Q1 по Q2?"
  - "По файлу population.csv: какова суммарная численность населения всех стран Азии за 2023 год и какую долю от азиатского итога составляет Индия?"
  - "По файлу population.csv: вычислите корреляцию между population_millions и gdp_per_capita за 2023 год и интерпретируйте её."
  - "По файлу population.csv: как изменилось население Индии с 2000 по 2023 год — в абсолютных миллионах и в процентах?"
  - "По файлу students.csv: каков средний балл по каждому предмету и у какого предмета наибольшее стандартное отклонение оценок?"
  - "По файлу students.csv: ранжируйте учащихся по среднему баллу по всем предметам и назовите трёх лучших с их средними значениями."
  - "По файлу students.csv: есть ли связь между attendance_pct и средним баллом? Подтвердите ответ значением корреляции."
  - "По файлам students.csv и sales.csv: опишите схему (названия столбцов и типы данных) каждого набора и укажите пропущенные значения, если они есть."
