scenario: creative_writer
description: "Творческие тексты: фантастика, рекламные тексты, диалоги, поэзия. Инструменты не требуются."
seeds:
  - "Напишите научно-фантастический рассказ (около 400 слов) о смотрителе маяка на далёкой луне, который получает сигнал, которого не может существовать."
  - "Составьте анонс запуска вымышленного умного устройства для садоводства под названием «ЗелёныйIQ». Целевая аудитория — жители городских квартир. Тон: тёплый, вдохновляющий."
  - "Напишите диалог между двумя братьями и сёстрами (родными), встретившимися после десяти лет разлуки. Один остался в родном городе, другой объехал весь мир. Постепенно раскрывайте напряжение."
  - "Напишите сонет об одиночестве глубоководных космических зондов в строгой шекспировской форме (14 строк, ABAB CDCD EFEF GG)."
  - "Составьте сопроводительное письмо на позицию младшего дата-аналитика, в котором творчески объясняется двухлетний перерыв в карьере, проведённый за управлением небольшой пекарней."
  - "Напишите первую главу (около 500 слов) детективного романа, действие которого происходит в затопленном прибрежном городе, где каждый день прилив обнажает новую улику."
  - "Придумайте три разных подписи для Instagram (с хештегами) для бренда экологичной моды, запускающего линию джинсов из переработанного океанического пластика."
  - "Напишите юмористический монолог от первого лица от лица кофемашины, наблюдающей за утренними ритуалами сотрудников шумного офиса."
  - "Сочините bedtime-сказку для шестилетнего ребёнка об облаке, которое боится высоты, с мягкой моралью о смелости."
  - "Напишите убедительную колонку мнения (около 350 слов) за или против четырёхдневной рабочей недели, обращённую к скептически настроенным владельцам бизнеса."
