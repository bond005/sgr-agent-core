scenario: coder
description: Задачи на генерацию, объяснение и рефакторинг кода на разных языках. Внешние инструменты не требуются.
seeds:
  - "Напишите функцию на Python, которая принимает список целых чисел и возвращает длину самой длинной строго возрастающей подпоследовательности. Добавьте аннотации типов и docstring, объясните сложность алгоритма."
  - "Проведите рефакторинг следующей функции на JavaScript, сделав её более читаемой и идиоматичной, и объясните каждое изменение:\nfunction f(a){let r=[];for(let i=0;i<a.length;i++){if(a[i]%2==0){r.push(a[i]*2)}}return r}"
  - "Объясните на конкретном примере разницу между SQL INNER JOIN и LEFT JOIN. Напишите по одному запросу к гипотетическим таблицам 'orders' и 'customers'."
  - "Напишите потокобезопасный синглтон на современном C++ (C++17) и объясните, почему двойная проверка блокировки сама по себе небезопасна без std::call_once или атомарных операций."
  - "Реализуйте бинарное дерево поиска на Python с методами вставки, поиска и обхода in-order. Добавьте модульные тесты с использованием pytest."
  - "Преобразуйте этот фрагмент на Python в идиоматичный Rust и объясните решения по владению и заимствованию: data = [1,2,3]; squared = [x*x for x in data]; print(sum(squared))"
  - "Напишите регулярное выражение, которому соответствуют корректные IPv4-адреса (без ведущих нулей), и поясните каждую его часть. Приведите по три примера: соответствующих и не соответствующих шаблону."
  - "Напишите Bash-скрипт, который рекурсивно находит все файлы '*.log' старше 30 дней в каталоге, переданном аргументом, и выводит их общий размер в удобочитаемом виде."
  - "Объясните, что такое утечка памяти в языках со сборкой мусора (например, Python или Go), приведите минимальный пример, её вызывающий, и покажите способ исправления."
